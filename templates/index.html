<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoPost — Wikipedia Photo Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'SF Mono', 'Consolas', 'Monaco', 'Menlo', monospace;
            background: #0d1117;
            color: #c9d1d9;
            line-height: 1.4;
            min-height: 100vh;
            font-size: 13px;
        }

        header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header h1 { font-size: 14px; font-weight: 600; white-space: nowrap; }
        header h1 span { color: #58a6ff; }
        .breadcrumb { font-size: 12px; color: #8b949e; }
        .breadcrumb a { color: #58a6ff; text-decoration: none; cursor: pointer; }
        .breadcrumb a:hover { text-decoration: underline; }
        .spacer { flex: 1; }
        main { padding: 12px 16px; max-width: 1400px; margin: 0 auto; }

        /* Buttons */
        .btn {
            padding: 4px 12px;
            border: 1px solid #30363d;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
            background: #21262d;
            color: #c9d1d9;
            transition: all 0.1s;
        }
        .btn:hover { background: #30363d; border-color: #8b949e; }
        .btn:disabled { opacity: 0.4; cursor: default; }
        .btn-primary { background: #238636; border-color: #238636; color: #fff; }
        .btn-primary:hover { background: #2ea043; }
        .btn-primary:disabled { background: #238636; }
        .btn-danger { color: #f85149; border-color: #f85149; background: transparent; }
        .btn-danger:hover { background: #f8514922; }

        /* Form inputs */
        input[type="text"], select {
            background: #0d1117;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-family: inherit;
        }
        input[type="text"]:focus, select:focus { outline: none; border-color: #58a6ff; }
        input[type="text"]::placeholder { color: #484f58; }

        /* Toolbar */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 0;
            flex-wrap: wrap;
        }
        .toolbar .count { color: #8b949e; font-size: 12px; }

        /* Stats bar */
        .stats-bar {
            display: flex;
            gap: 16px;
            padding: 10px 12px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .stat { display: flex; gap: 4px; align-items: baseline; }
        .stat-val { font-weight: 700; color: #58a6ff; }
        .stat-label { color: #8b949e; font-size: 11px; }

        /* Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid #30363d;
            border-radius: 6px;
            overflow: hidden;
        }
        .data-table thead th {
            background: #161b22;
            padding: 6px 10px;
            text-align: left;
            font-size: 11px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            border-bottom: 1px solid #30363d;
            font-weight: 600;
            white-space: nowrap;
            user-select: none;
        }
        .data-table thead th.sortable { cursor: pointer; }
        .data-table thead th.sortable:hover { color: #c9d1d9; }
        .data-table thead th.sorted { color: #58a6ff; }
        .data-table tbody tr { border-bottom: 1px solid #21262d; }
        .data-table tbody tr:hover { background: #161b22; }
        .data-table tbody tr.clickable { cursor: pointer; }
        .data-table td { padding: 5px 10px; vertical-align: middle; }
        .data-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
        .data-table td.muted { color: #8b949e; }
        .data-table td img {
            width: 40px; height: 28px; object-fit: cover;
            border-radius: 3px; background: #0d1117; vertical-align: middle;
        }

        /* Badge */
        .badge {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-blue { background: #0d419d; color: #58a6ff; }
        .badge-yellow { background: #3d2e00; color: #d29922; }
        .badge-green { background: #0f5323; color: #3fb950; }
        .badge-red { background: #67060c; color: #f85149; }

        /* Pagination */
        .pager {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            color: #8b949e;
        }
        .pager button { padding: 2px 8px; font-size: 11px; }
        .pager input {
            width: 48px;
            text-align: center;
            padding: 2px 4px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid #30363d;
            margin-bottom: 12px;
        }
        .tab {
            padding: 8px 16px;
            font-size: 12px;
            color: #8b949e;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            font-family: inherit;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
        }
        .tab:hover { color: #c9d1d9; }
        .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }

        /* User row */
        .user-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            border-bottom: 1px solid #21262d;
        }
        .user-row:last-child { border-bottom: none; }
        .user-row:hover { background: #161b22; }
        .user-name { font-weight: 600; color: #58a6ff; cursor: pointer; }
        .user-name:hover { text-decoration: underline; }
        .user-meta { font-size: 11px; color: #8b949e; }

        /* Progress */
        .progress-banner {
            background: #0d419d33;
            border: 1px solid #0d419d;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 12px;
            color: #58a6ff;
        }
        .progress-bar-bg {
            height: 4px;
            background: #21262d;
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: #58a6ff;
            border-radius: 2px;
            transition: width 0.3s;
        }
        .result-banner {
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 12px;
            border: 1px solid;
        }
        .result-banner.ok { background: #0f532333; border-color: #238636; color: #3fb950; }
        .result-banner.err { background: #67060c33; border-color: #f85149; color: #f85149; }

        .spinner {
            display: inline-block;
            width: 12px; height: 12px;
            border: 2px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty { text-align: center; padding: 32px; color: #484f58; }

        /* Photo detail header */
        .photo-header {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }
        .photo-header img {
            width: 280px; height: 200px;
            object-fit: cover;
            border-radius: 6px;
            background: #161b22;
            border: 1px solid #30363d;
        }
        .photo-info { flex: 1; }
        .photo-info h2 { font-size: 14px; word-break: break-all; margin-bottom: 4px; }
        .photo-info .desc { color: #8b949e; font-size: 12px; margin-bottom: 6px; }
        .tag {
            display: inline-block;
            background: #0d419d44;
            color: #79c0ff;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 11px;
            margin: 1px;
        }
        .wiki-bar {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        /* Event feed */
        .event-row {
            display: flex;
            gap: 8px;
            padding: 4px 0;
            border-bottom: 1px solid #21262d;
            align-items: baseline;
            font-size: 12px;
        }
        .event-row:last-child { border-bottom: none; }
        .dot { width: 6px; height: 6px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
        .dot.added { background: #3fb950; }
        .dot.removed { background: #f85149; }

        @media (max-width: 800px) {
            .photo-header { flex-direction: column; }
            .photo-header img { width: 100%; height: 180px; }
        }
    </style>
</head>
<body>
<header>
    <h1 style="cursor:pointer" onclick="go('users')">Photo<span>Post</span></h1>
    <div id="breadcrumb" class="breadcrumb"></div>
    <div style="flex:1"></div>
    <button class="btn" onclick="go('checklists')" style="font-size:12px;margin-left:auto">Checklists</button>
</header>

<main id="app"></main>

<script>
let view = 'users', userId = null, photoId = null;
let detailSort = 'usages', detailPage = 1, detailSearch = '';
let detailTab = 'photos';
let usagePage = 1;
let pollTimers = {};

const $ = id => document.getElementById(id);
const app = $('app'), bc = $('breadcrumb');

function esc(s) { const d = document.createElement('div'); d.textContent = s||''; return d.innerHTML; }
function trunc(s, n) { return s && s.length > n ? s.slice(0,n)+'...' : (s||''); }
function relTime(iso) {
    if (!iso) return 'never';
    const ms = Date.now() - new Date(iso).getTime();
    if (ms < 60000) return 'just now';
    if (ms < 3600000) return Math.floor(ms/60000)+'m ago';
    if (ms < 86400000) return Math.floor(ms/3600000)+'h ago';
    return new Date(iso).toLocaleDateString();
}

async function api(path, opts={}) {
    const r = await fetch(path, { headers:{'Content-Type':'application/json'}, ...opts, body: opts.body ? JSON.stringify(opts.body) : undefined });
    return r.json();
}

function go(v, uid, pid) {
    view = v; userId = uid||null; photoId = pid||null;
    if (v === 'user-detail') { detailPage = 1; detailSearch = ''; detailTab = 'photos'; }
    if (v === 'photo-detail') { usagePage = 1; }
    render();
}

async function render() {
    if (view === 'users') await renderUsers();
    else if (view === 'user-detail') await renderUserDetail();
    else if (view === 'photo-detail') await renderPhotoDetail();
    else if (view === 'checklists') await renderChecklists();
    else if (view === 'checklist-detail') await renderChecklistView();
}

// ─── Users ───
async function renderUsers() {
    bc.innerHTML = '';
    const users = await api('api/users');
    app.innerHTML = `
        <div class="toolbar">
            <input type="text" id="new-user" placeholder="Commons username..." style="width:220px">
            <button class="btn btn-primary" onclick="addUser()">Track User</button>
        </div>
        ${users.length === 0 ? '<div class="empty">No tracked users. Add a Commons username above.</div>' : `
        <table class="data-table">
            <thead><tr>
                <th>Username</th>
                <th style="width:100px" class="num">Photos</th>
                <th style="width:100px" class="num">Usages</th>
                <th style="width:140px">Last Polled</th>
                <th style="width:200px">Actions</th>
            </tr></thead>
            <tbody>
                ${users.map(u => `<tr>
                    <td><span class="user-name" onclick="go('user-detail',${u.id})">${esc(u.username)}</span></td>
                    <td class="num">${u.photo_count.toLocaleString()}</td>
                    <td class="num">${u.active_usages.toLocaleString()}</td>
                    <td class="muted">${relTime(u.last_polled)}</td>
                    <td>
                        <button class="btn btn-primary" onclick="event.stopPropagation();pollAndTrack(${u.id},'${esc(u.username)}')" ${u.is_polling?'disabled':''}>
                            ${u.is_polling?'<span class="spinner"></span> Polling':'Poll Now'}
                        </button>
                        <button class="btn btn-danger" onclick="event.stopPropagation();delUser(${u.id},'${esc(u.username)}')">Delete</button>
                    </td>
                </tr>
                ${u.is_polling ? `<tr><td colspan="5" style="padding:4px 10px">
                    <div class="progress-bar-bg"><div class="progress-bar-fill" id="ubar-${u.id}" style="width:0%"></div></div>
                    <div style="color:#58a6ff;font-size:11px;margin-top:2px" id="udet-${u.id}">Starting...</div>
                </td></tr>` : ''}
                `).join('')}
            </tbody>
        </table>`}`;
    $('new-user')?.addEventListener('keydown', e => { if(e.key==='Enter') addUser(); });
    users.filter(u=>u.is_polling).forEach(u => startUserTimer(u.id));
}

async function addUser() {
    const v = $('new-user').value.trim(); if(!v) return;
    const r = await api('api/users',{method:'POST',body:{username:v}});
    if(r.error && !r.id) { alert(r.error); return; }
    render();
}
async function delUser(id,name) { if(!confirm('Delete '+name+'?')) return; await api('api/users/'+id,{method:'DELETE'}); render(); }
async function pollAndTrack(id,name) { await api('api/users/'+id+'/poll',{method:'POST'}); render(); }

function startUserTimer(id) {
    if(pollTimers[id]) clearInterval(pollTimers[id]);
    pollTimers[id] = setInterval(async()=>{
        const s = await api('api/users/'+id+'/poll-status');
        if(!s.is_polling) { clearInterval(pollTimers[id]); delete pollTimers[id]; render(); return; }
        if(s.progress) {
            const bar=$('ubar-'+id), det=$('udet-'+id);
            if(bar) bar.style.width=(s.progress.pct||0)+'%';
            if(det) det.textContent=(s.progress.detail||'')+' ('+( s.progress.pct||0)+'%)';
        }
    }, 2000);
}

// ─── User Detail ───
async function renderUserDetail() {
    const id = userId;
    bc.innerHTML = `<a onclick="go('users')">Users</a> / ...`;

    const [stats, statusData] = await Promise.all([
        api('api/users/'+id+'/stats'),
        api('api/users/'+id+'/poll-status'),
    ]);

    const isPolling = statusData.is_polling;
    const pollResult = statusData.result;

    // Load tab content
    let tabContent = '';
    if (detailTab === 'photos') {
        const q = detailSearch ? '&q='+encodeURIComponent(detailSearch) : '';
        const photosData = await api(`api/users/${id}/photos?page=${detailPage}&per_page=50&sort=${detailSort}${q}`);
        bc.innerHTML = `<a onclick="go('users')">Users</a> / ${esc(photosData.username)}`;
        const tp = photosData.pages;

        function thSort(field, label, width) {
            const cur = detailSort === field;
            const rev = detailSort === field ? field+'_asc' : (detailSort === field+'_asc' ? field : field);
            const arrow = cur ? ' &#9660;' : (detailSort === field+'_asc' ? ' &#9650;' : '');
            const cls = (cur || detailSort === field+'_asc') ? 'sortable sorted' : 'sortable';
            return `<th class="${cls}" style="width:${width}" onclick="toggleSort('${field}')">${label}${arrow}</th>`;
        }

        tabContent = `
            <div class="toolbar">
                <input type="text" id="search-box" placeholder="Search filenames..." value="${esc(detailSearch)}" style="width:250px">
                <div class="spacer" style="flex:1"></div>
                <div class="pager">
                    <span class="count">${photosData.total.toLocaleString()} photos</span>
                    <button class="btn" onclick="detailPage--;render()" ${detailPage<=1?'disabled':''}>&laquo;</button>
                    <span>${detailPage}/${tp}</span>
                    <button class="btn" onclick="detailPage++;render()" ${detailPage>=tp?'disabled':''}>&raquo;</button>
                </div>
            </div>
            <table class="data-table">
                <thead><tr>
                    <th style="width:48px"></th>
                    ${thSort('name','Filename','')}
                    ${thSort('usages','Usages','90px')}
                    ${thSort('date','Uploaded','100px')}
                </tr></thead>
                <tbody>
                    ${photosData.photos.length===0 ? '<tr><td colspan="4" class="empty">No photos found</td></tr>' : ''}
                    ${photosData.photos.map(p => `
                        <tr class="clickable" onclick="go('photo-detail',${id},${p.id})">
                            <td><a href="https://commons.wikimedia.org/wiki/File:${encodeURIComponent(p.filename)}" target="_blank" onclick="event.stopPropagation()"><img src="${esc(p.thumb_url)}" onerror="this.style.visibility='hidden'" loading="lazy"></a></td>
                            <td>
                                <div style="font-weight:500">${esc(trunc(p.filename,70))}</div>
                                ${p.description?'<div style="color:#8b949e;font-size:11px">'+esc(trunc(p.description,80))+'</div>':''}
                            </td>
                            <td class="num"><span class="badge ${p.usage_count===0?'badge-yellow':'badge-blue'}">${p.usage_count.toLocaleString()}</span></td>
                            <td class="muted">${p.upload_date?new Date(p.upload_date).toLocaleDateString():''}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>`;
    } else if (detailTab === 'events') {
        const eventsData = await api('api/users/'+id+'/events?limit=100');
        tabContent = `
            <table class="data-table">
                <thead><tr>
                    <th style="width:20px"></th>
                    <th>Photo</th>
                    <th>Action</th>
                    <th>Article</th>
                    <th>Wiki</th>
                    <th style="width:140px">Time</th>
                </tr></thead>
                <tbody>
                    ${eventsData.events.length===0?'<tr><td colspan="6" class="empty">No events recorded yet</td></tr>':''}
                    ${eventsData.events.map(e => `
                        <tr>
                            <td><span class="dot ${e.event_type}"></span></td>
                            <td><span style="color:#58a6ff;cursor:pointer" onclick="go('photo-detail',${id},${e.photo_id})">${esc(trunc(e.photo_filename,40))}</span></td>
                            <td><span class="badge ${e.event_type==='added'?'badge-green':'badge-red'}">${e.event_type}</span></td>
                            <td>${esc(trunc(e.article_title,50))}</td>
                            <td class="muted">${esc(e.wiki)}</td>
                            <td class="muted">${relTime(e.timestamp)}</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>`;
    }

    app.innerHTML = `
        ${isPolling ? `<div class="progress-banner" id="poll-banner">
            <span class="spinner"></span> Polling...
            <span id="poll-pct" style="float:right">${statusData.progress?.pct||0}%</span>
            <div class="progress-bar-bg"><div class="progress-bar-fill" id="poll-bar" style="width:${statusData.progress?.pct||0}%"></div></div>
            <div id="poll-detail" style="margin-top:2px">${esc(statusData.progress?.detail||'Starting...')}</div>
        </div>` : ''}
        ${pollResult && !pollResult.error ? `<div class="result-banner ok">${pollResult.total_photos} photos, +${pollResult.new_photos} new, +${pollResult.new_usages} usages, -${pollResult.removed_usages} removed</div>` : ''}
        ${pollResult?.error ? `<div class="result-banner err">${esc(pollResult.error)}</div>` : ''}

        <div class="stats-bar">
            <div class="stat"><span class="stat-val">${stats.total_photos.toLocaleString()}</span> <span class="stat-label">photos</span></div>
            <div class="stat"><span class="stat-val">${stats.active_usages.toLocaleString()}</span> <span class="stat-label">usages</span></div>
            <div class="stat"><span class="stat-val">${stats.unused_photos.toLocaleString()}</span> <span class="stat-label">unused</span></div>
            <div class="stat"><span class="stat-val">${stats.unique_wikis}</span> <span class="stat-label">wikis</span></div>
            <div class="stat"><span class="stat-val">${stats.avg_usages}</span> <span class="stat-label">avg/photo</span></div>
            <div class="spacer" style="flex:1"></div>
            <button class="btn btn-primary" onclick="pollDetail(${id})" ${isPolling?'disabled':''}>
                ${isPolling?'<span class="spinner"></span> Polling...':'Poll Now'}
            </button>
        </div>

        <div class="tabs">
            <button class="tab ${detailTab==='photos'?'active':''}" onclick="detailTab='photos';render()">Photos</button>
            <button class="tab ${detailTab==='events'?'active':''}" onclick="detailTab='events';render()">Events</button>
        </div>
        ${tabContent}
    `;

    if (detailTab === 'photos') {
        const sb = $('search-box');
        if (sb) {
            let timer;
            sb.addEventListener('input', () => {
                clearTimeout(timer);
                timer = setTimeout(() => { detailSearch = sb.value; detailPage = 1; render(); }, 300);
            });
        }
    }

    if (isPolling) {
        if(pollTimers['d'+id]) clearInterval(pollTimers['d'+id]);
        pollTimers['d'+id] = setInterval(async()=>{
            const s = await api('api/users/'+id+'/poll-status');
            if(!s.is_polling) { clearInterval(pollTimers['d'+id]); delete pollTimers['d'+id]; render(); return; }
            if(s.progress) {
                const bar=$('poll-bar'),pct=$('poll-pct'),det=$('poll-detail');
                if(bar) bar.style.width=(s.progress.pct||0)+'%';
                if(pct) pct.textContent=(s.progress.pct||0)+'%';
                if(det) det.textContent=s.progress.detail||'';
            }
        }, 2000);
    }
}

function toggleSort(field) {
    if (detailSort === field) detailSort = field + '_asc';
    else if (detailSort === field + '_asc') detailSort = field;
    else detailSort = field;
    detailPage = 1;
    render();
}

async function pollDetail(id) { await api('api/users/'+id+'/poll',{method:'POST'}); render(); }

// ─── Photo Detail ───
async function renderPhotoDetail() {
    const pid = photoId;
    bc.innerHTML = `<a onclick="go('users')">Users</a> / ... / Photo`;

    const photo = await api(`api/photos/${pid}?usage_page=${usagePage}`);
    if (photo.error) { app.innerHTML = '<div class="empty">'+esc(photo.error)+'</div>'; return; }

    bc.innerHTML = `<a onclick="go('users')">Users</a> / <a onclick="go('user-detail',${photo.user_id})">${esc(photo.username)}</a> / ${esc(trunc(photo.filename,40))}`;

    const up = photo.usage_pages;

    app.innerHTML = `
        <div class="photo-header">
            <a href="https://commons.wikimedia.org/wiki/File:${encodeURIComponent(photo.filename)}" target="_blank"><img src="${esc(photo.thumb_url)}" onerror="this.style.visibility='hidden'"></a>
            <div class="photo-info">
                <h2>${esc(photo.filename)}</h2>
                ${photo.description?'<div class="desc">'+esc(photo.description)+'</div>':''}
                <div style="color:#8b949e;margin-bottom:6px">Uploaded ${photo.upload_date?new Date(photo.upload_date).toLocaleDateString():''}</div>
                <div style="margin-bottom:8px">${(photo.categories||[]).slice(0,12).map(c=>'<span class="tag">'+esc(c)+'</span>').join(' ')}</div>
                <div class="stats-bar" style="margin-bottom:8px;display:inline-flex">
                    <div class="stat"><span class="stat-val">${photo.active_total.toLocaleString()}</span> <span class="stat-label">active</span></div>
                    <div class="stat"><span class="stat-val">${photo.removed_count}</span> <span class="stat-label">removed</span></div>
                    <div class="stat"><span class="stat-val">${photo.wiki_breakdown.length}</span> <span class="stat-label">wikis</span></div>
                </div>
                <div class="wiki-bar">
                    ${photo.wiki_breakdown.slice(0,15).map(w => `<span class="badge badge-blue">${esc(w.wiki)} (${w.count})</span>`).join(' ')}
                </div>
                <div style="margin-top:8px">
                    <a href="https://commons.wikimedia.org/wiki/File:${encodeURIComponent(photo.filename)}" target="_blank" class="btn">View on Commons</a>
                    <button class="btn btn-primary" id="suggest-btn" onclick="doSuggest()">AI Suggest</button>
                    <button class="btn" id="missing-btn" onclick="doMissingLangs()">Find Missing Languages</button>
                </div>
                <div id="suggestions"></div>
                <div id="missing-langs"></div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active">Usages (${photo.active_total.toLocaleString()})</button>
        </div>
        <div class="toolbar">
            <div class="spacer" style="flex:1"></div>
            <div class="pager">
                <button class="btn" onclick="usagePage--;render()" ${usagePage<=1?'disabled':''}>&laquo;</button>
                <span>${usagePage}/${up}</span>
                <button class="btn" onclick="usagePage++;render()" ${usagePage>=up?'disabled':''}>&raquo;</button>
            </div>
        </div>
        <table class="data-table">
            <thead><tr>
                <th>Article</th>
                <th style="width:200px">Wiki</th>
                <th style="width:120px">First Seen</th>
            </tr></thead>
            <tbody>
                ${photo.active_usages.length===0?'<tr><td colspan="3" class="empty">No usages</td></tr>':''}
                ${photo.active_usages.map(u => `
                    <tr>
                        <td><a href="${esc(u.article_url)}" target="_blank" style="color:#58a6ff;text-decoration:none">${esc(u.article_title)}</a></td>
                        <td class="muted">${esc(u.wiki)}</td>
                        <td class="muted">${relTime(u.first_seen)}</td>
                    </tr>
                `).join('')}
            </tbody>
        </table>

        ${photo.events.length>0 ? `
        <div class="tabs" style="margin-top:16px">
            <button class="tab active">History (${photo.events.length})</button>
        </div>
        <table class="data-table">
            <thead><tr>
                <th style="width:20px"></th>
                <th style="width:80px">Action</th>
                <th>Article</th>
                <th style="width:180px">Wiki</th>
                <th style="width:140px">Time</th>
            </tr></thead>
            <tbody>
                ${photo.events.map(e=>`
                    <tr>
                        <td><span class="dot ${e.event_type}"></span></td>
                        <td><span class="badge ${e.event_type==='added'?'badge-green':'badge-red'}">${e.event_type}</span></td>
                        <td>${esc(e.article_title)}</td>
                        <td class="muted">${esc(e.wiki)}</td>
                        <td class="muted">${new Date(e.timestamp).toLocaleString()}</td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
        ` : ''}
    `;

    window._photo = photo;
}

async function doSuggest() {
    const btn=$('suggest-btn'), box=$('suggestions'), p=window._photo;
    if(!p) return;
    btn.disabled=true; btn.textContent='Asking AI...';
    try {
        const d = await api('api/suggest',{method:'POST',body:{
            categories: p.categories||[],
            description: p.description||'',
            filename: p.filename||'',
            current_articles: p.active_usages.map(u=>u.article_title),
            current_usages: p.active_usages.map(u=>({article_title:u.article_title, wiki:u.wiki})),
        }});
        if(d.suggestions?.length) {
            box.innerHTML = `<div style="margin-top:12px">
                <div style="font-size:11px;color:#8b949e;margin-bottom:6px">${d.suggestions.length} verified suggestions across ${[...new Set(d.suggestions.map(s=>s.lang))].length} languages</div>
                <table class="data-table">
                    <thead><tr>
                        <th style="width:40px">Lang</th>
                        <th>Article</th>
                        <th>Reason</th>
                        <th>Wikicode (click to copy)</th>
                        <th style="width:60px">Edit</th>
                    </tr></thead>
                    <tbody>
                        ${d.suggestions.map(s => {
                            const wiki = s.wiki || 'en.wikipedia.org';
                            const editUrl = 'https://'+wiki+'/wiki/'+encodeURIComponent((s.title||'').replace(/ /g,'_'))+'?action=edit';
                            const articleUrl = 'https://'+wiki+'/wiki/'+encodeURIComponent((s.title||'').replace(/ /g,'_'));
                            const wikicode = s.wikicode || '';
                            return `<tr>
                                <td><span class="badge badge-blue">${esc(s.lang||'en')}</span></td>
                                <td><a href="${esc(articleUrl)}" target="_blank" style="color:#58a6ff;text-decoration:none">${esc((s.title||'').replace(/_/g,' '))}</a></td>
                                <td class="muted" style="font-size:11px">${esc(s.reason||'')}</td>
                                <td><code style="cursor:pointer;background:#161b22;padding:2px 6px;border-radius:3px;font-size:10px;word-break:break-all;display:block;max-width:300px" onclick="navigator.clipboard.writeText(this.textContent);this.style.background='#0f5323';setTimeout(()=>this.style.background='#161b22',1000)" title="Click to copy">${esc(wikicode)}</code></td>
                                <td><a href="${esc(editUrl)}" target="_blank" class="btn btn-primary" style="font-size:10px;padding:2px 6px">Edit</a></td>
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>
            </div>`;
        } else box.innerHTML='<div style="color:#8b949e;margin-top:4px">No suggestions found</div>';
    } catch(e) { box.innerHTML='<div style="color:#f85149;margin-top:4px">Error: '+esc(e.message)+'</div>'; }
    finally { btn.style.display='none'; }
}

// ─── Checklists (top-level) ───
let checklistViewId = null;

async function renderChecklists() {
    bc.innerHTML = 'Checklists';
    const clData = await api('api/checklists');

    app.innerHTML = `
        <div class="toolbar">
            <textarea id="cl-articles" placeholder="Paste articles (one per line) — supports:&#10;Article Name&#10;https://en.wikipedia.org/wiki/Article_Name&#10;https://fr.wikipedia.org/wiki/Nom_Article&#10;fr.wikipedia.org:Nom Article" style="width:100%;height:100px;background:#0d1117;border:1px solid #30363d;color:#c9d1d9;border-radius:4px;padding:8px;font-family:inherit;font-size:12px;resize:vertical"></textarea>
        </div>
        <div class="toolbar">
            <input type="text" id="cl-name" placeholder="Checklist name..." style="width:200px" value="Checklist ${new Date().toLocaleDateString()}">
            <button class="btn btn-primary" onclick="createChecklist()">Create Checklist</button>
            <span class="muted" style="font-size:11px">Checks all tracked users' photos against each article</span>
        </div>
        ${clData.length===0?'<div class="empty">No checklists yet. Paste a list of articles above.</div>':''}
        ${clData.map(c => `
            <div style="background:#161b22;border:1px solid #30363d;border-radius:6px;padding:10px 14px;margin-bottom:8px">
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                    <span style="font-weight:600;cursor:pointer;color:#58a6ff" onclick="go('checklist-detail',${c.id})">${esc(c.name)}</span>
                    <span class="badge badge-blue">${c.item_count} articles</span>
                    ${c.last_checked ? `<span class="badge badge-green">${c.found} found</span><span class="badge badge-red">${c.missing} missing</span>` : '<span class="badge badge-yellow">unchecked</span>'}
                    <div style="flex:1"></div>
                    <button class="btn btn-primary" onclick="startCheck(${c.id})" style="font-size:11px">Check Now</button>
                    <button class="btn" onclick="go('checklist-detail',${c.id})" style="font-size:11px">View</button>
                    <button class="btn btn-danger" onclick="deleteChecklist(${c.id})" style="font-size:11px">Delete</button>
                </div>
                ${c.last_checked ? '<div style="font-size:11px;color:#8b949e;margin-top:4px">Last checked: '+relTime(c.last_checked)+'</div>' : ''}
                <div id="cl-progress-${c.id}"></div>
            </div>
        `).join('')}
    `;

    // Auto-detect running checks and resume progress polling
    for (const c of clData) {
        const s = await api('api/checklists/'+c.id+'/check-status');
        if (s.running) watchCheck(c.id);
    }
}

async function createChecklist() {
    const text = $('cl-articles')?.value?.trim();
    const name = $('cl-name')?.value?.trim() || 'Checklist';
    if (!text) { alert('Paste article list first'); return; }
    const articles = text.split('\n').map(l => l.trim()).filter(Boolean);
    const r = await api('api/checklists', {method:'POST', body:{name, articles}});
    if (r.error) { alert(r.error); return; }
    render();
}

async function deleteChecklist(clId) {
    if (!confirm('Delete this checklist?')) return;
    await api('api/checklists/'+clId, {method:'DELETE'});
    render();
}

async function startCheck(clId, skipPost) {
    if (!skipPost) {
        const r = await api('api/checklists/'+clId+'/check', {method:'POST'});
        if (r.error) { /* already running is fine */ }
    }
    watchCheck(clId);
}

function watchCheck(clId) {
    if (pollTimers['cl'+clId]) clearInterval(pollTimers['cl'+clId]);
    pollTimers['cl'+clId] = setInterval(async () => {
        const s = await api('api/checklists/'+clId+'/check-status');
        // Update any progress box on screen (list view or detail view)
        const box = $('cl-progress-'+clId) || $('cl-detail-progress');
        if (box) {
            if (s.running) {
                const elapsed = s.checked > 0 ? (s.pct > 0 ? Math.round((100 - s.pct) / s.pct * s.checked * 0.3) : 0) : 0;
                const eta = elapsed > 0 ? `~${elapsed}s remaining` : '';
                box.innerHTML = `
                    <div class="progress-banner" style="margin-top:6px">
                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
                            <span class="spinner"></span>
                            <strong>Checking articles...</strong>
                            <span>${s.checked} / ${s.total}</span>
                            <span style="margin-left:auto">${s.pct}%</span>
                        </div>
                        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${s.pct}%"></div></div>
                        <div style="display:flex;gap:12px;margin-top:6px;font-size:11px">
                            <span style="color:#3fb950">Found: ${s.found}</span>
                            <span style="color:#f85149">Missing: ${s.missing}</span>
                            ${s.errors?`<span style="color:#d29922">Errors: ${s.errors}</span>`:''}
                            <span style="flex:1"></span>
                            <span class="muted">${eta}</span>
                        </div>
                        <div style="margin-top:4px;font-size:11px;color:#8b949e">
                            Now checking: <span style="color:#c9d1d9">${esc(s.current)}</span>
                        </div>
                    </div>`;
            } else {
                box.innerHTML = `
                    <div class="result-banner ok" style="margin-top:6px">
                        Check complete: <strong>${s.found}</strong> found, <strong>${s.missing}</strong> missing${s.errors?`, <strong>${s.errors}</strong> errors`:''} (${s.total} articles)
                    </div>`;
                clearInterval(pollTimers['cl'+clId]);
                delete pollTimers['cl'+clId];
                setTimeout(render, 2000);
            }
        }
    }, 1000);
}

async function renderChecklistView() {
    const clId = userId;  // reusing userId for checklist ID via go()
    checklistViewId = clId;
    bc.innerHTML = `<a onclick="go('checklists')">Checklists</a> / ...`;

    const [cl, status] = await Promise.all([
        api('api/checklists/'+clId),
        api('api/checklists/'+clId+'/check-status'),
    ]);
    if (cl.error) { app.innerHTML = '<div class="empty">'+esc(cl.error)+'</div>'; return; }

    bc.innerHTML = `<a onclick="go('checklists')">Checklists</a> / ${esc(cl.name)}`;

    const found = cl.items.filter(i => i.status==='found');
    const missing = cl.items.filter(i => i.status==='missing');

    app.innerHTML = `
        <div class="toolbar">
            <span style="font-weight:600">${esc(cl.name)}</span>
            <span class="badge badge-blue">${cl.items.length} articles</span>
            ${cl.last_checked ? `<span class="badge badge-green">${found.length} found</span><span class="badge badge-red">${missing.length} missing</span>` : ''}
            <div style="flex:1"></div>
            <button class="btn btn-primary" onclick="startCheck(${clId})">Check Now</button>
        </div>
        <div id="cl-detail-progress"></div>
        <table class="data-table">
            <thead><tr>
                <th style="width:60px">Status</th>
                <th>Article</th>
                <th style="width:180px">Wiki</th>
                <th>Photos Found</th>
                <th style="width:100px">Checked</th>
                <th style="width:100px"></th>
            </tr></thead>
            <tbody>
                ${cl.items.map(i => {
                    // found_files is now [{file,user},...] or strings (legacy)
                    const files = i.found_files || [];
                    const fileDisplay = files.length > 0 ? files.map(f => {
                        if (typeof f === 'object') return '<span class="tag">'+esc(trunc((f.file||'').replace(/_/g,' '),35))+'</span> <span class="muted" style="font-size:10px">'+esc(f.user)+'</span>';
                        return '<span class="tag">'+esc(trunc(String(f).replace(/_/g,' '),35))+'</span>';
                    }).join(' ') : '<span class="muted">-</span>';
                    return `
                    <tr>
                        <td><span class="badge ${i.status==='found'?'badge-green':i.status==='missing'?'badge-red':i.status==='error'?'badge-red':'badge-yellow'}">${i.status}</span></td>
                        <td><a href="https://${esc(i.wiki)}/wiki/${encodeURIComponent(i.article_title.replace(/ /g,'_'))}" target="_blank" style="color:#58a6ff;text-decoration:none">${esc(i.article_title.replace(/_/g,' '))}</a></td>
                        <td class="muted">${esc(i.wiki)}</td>
                        <td>${fileDisplay}</td>
                        <td class="muted">${i.last_checked?relTime(i.last_checked):'-'}</td>
                        <td>${i.status==='missing'?`<button class="btn" style="font-size:10px;padding:2px 6px" onclick="checkHistory('${esc(i.wiki)}','${esc(i.article_title)}',this)">Check History</button>`:''}</td>
                    </tr>`;
                }).join('')}
            </tbody>
        </table>
    `;

    // If check is running, resume progress polling (don't re-POST)
    if (status.running) watchCheck(clId);
}

async function checkHistory(wiki, articleTitle, btn) {
    btn.disabled = true;
    btn.textContent = 'Checking...';
    const row = btn.closest('tr');
    try {
        const d = await api('api/check-removal', {
            method: 'POST',
            body: { wiki, article_title: articleTitle },
        });
        // Insert result row after current row
        const resultRow = document.createElement('tr');
        if (d.removals && d.removals.length > 0) {
            resultRow.innerHTML = `<td colspan="6" style="background:#1c1210;padding:8px 10px;font-size:12px">
                <div style="color:#f85149;font-weight:600;margin-bottom:4px">Photo removed from this article:</div>
                ${d.removals.map(r => `
                    <div style="margin-bottom:6px;padding:4px 0;border-bottom:1px solid #30363d">
                        <span class="tag">${esc(r.file.replace(/_/g,' '))}</span>
                        <span class="muted">(${esc(r.user)})</span><br>
                        <span style="color:#f85149">Removed by</span> <strong>${esc(r.removed_by)}</strong>
                        on ${new Date(r.removed_at).toLocaleString()}<br>
                        <span class="muted">Comment: ${esc(r.edit_comment || 'none')}</span><br>
                        <a href="${esc(r.diff_url)}" target="_blank" style="color:#58a6ff">View diff</a>
                    </div>
                `).join('')}
                <div class="muted">${d.revisions_checked} revisions checked</div>
            </td>`;
        } else {
            resultRow.innerHTML = `<td colspan="6" style="background:#161b22;padding:8px 10px;font-size:12px">
                <span class="muted">No tracked photo removals found in last ${d.revisions_checked} revisions</span>
            </td>`;
        }
        row.after(resultRow);
        btn.style.display = 'none';
    } catch (e) {
        btn.textContent = 'Error';
        btn.disabled = false;
    }
}

async function doMissingLangs() {
    const btn=$('missing-btn'), box=$('missing-langs'), p=window._photo;
    if(!p) return;
    btn.disabled=true; btn.textContent='Searching...';
    try {
        const d = await api(`api/photos/${p.id}/missing-languages`);
        if(d.missing?.length) {
            box.innerHTML = `
                <div style="margin-top:12px">
                    <div style="font-size:11px;color:#8b949e;margin-bottom:4px">${d.total_missing} language versions missing this photo (checked: ${d.checked_articles.join(', ')})</div>
                    <table class="data-table">
                        <thead><tr>
                            <th style="width:60px">Lang</th>
                            <th>Article</th>
                            <th style="width:120px">Source</th>
                            <th style="width:80px">Action</th>
                        </tr></thead>
                        <tbody>
                            ${d.missing.map(m=>`
                                <tr>
                                    <td><span class="badge badge-blue">${esc(m.lang)}</span></td>
                                    <td><a href="${esc(m.edit_url)}" target="_blank" style="color:#58a6ff;text-decoration:none">${esc(m.article_title)}</a></td>
                                    <td class="muted">${esc(m.source_article)}</td>
                                    <td><a href="${esc(m.edit_url)}?action=edit" target="_blank" class="btn btn-primary" style="font-size:11px;padding:2px 6px">Edit</a></td>

                        </tbody>
                    </table>
                </div>`;
        } else box.innerHTML='<div style="color:#8b949e;margin-top:8px">No missing language articles found</div>';
    } catch(e) { box.innerHTML='<div style="color:#f85149;margin-top:8px">Error: '+esc(e.message)+'</div>'; }
    finally { btn.style.display='none'; }
}

// ─── Browser back/forward ───
function pushState() {
    const state = {view, userId, photoId};
    const url = view === 'users' ? './' :
                view === 'user-detail' ? `?user=${userId}` :
                view === 'photo-detail' ? `?user=${userId}&photo=${photoId}` :
                view === 'checklists' ? '?view=checklists' :
                view === 'checklist-detail' ? `?view=checklist&id=${userId}` :
                './';
    history.pushState(state, '', url);
}

window.addEventListener('popstate', (e) => {
    if (e.state) {
        view = e.state.view || 'users';
        userId = e.state.userId || null;
        photoId = e.state.photoId || null;
    } else {
        view = 'users'; userId = null; photoId = null;
    }
    render();
});

// Override go() to push state
const _origGo = go;
go = function(v, uid, pid) {
    _origGo(v, uid, pid);
    pushState();
};

// Handle initial URL params
(function initFromUrl() {
    const params = new URLSearchParams(location.search);
    if (params.get('view') === 'checklists') {
        view = 'checklists';
    } else if (params.get('view') === 'checklist' && params.get('id')) {
        view = 'checklist-detail';
        userId = parseInt(params.get('id'));
    } else if (params.get('photo') && params.get('user')) {
        view = 'photo-detail';
        userId = parseInt(params.get('user'));
        photoId = parseInt(params.get('photo'));
    } else if (params.get('user')) {
        view = 'user-detail';
        userId = parseInt(params.get('user'));
    }
})();

render();
pushState();
</script>
