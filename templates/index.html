<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoPost — Wikipedia Photo Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e1e4eb;
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Layout */
        header {
            background: #1a1d27;
            border-bottom: 1px solid #2a2d3a;
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        header h1 { font-size: 1.2rem; font-weight: 700; white-space: nowrap; }
        header h1 span { color: #3b82f6; }
        .breadcrumb { font-size: 0.85rem; color: #8b8fa3; }
        .breadcrumb a { color: #3b82f6; text-decoration: none; cursor: pointer; }
        .breadcrumb a:hover { text-decoration: underline; }
        .spacer { flex: 1; }
        main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

        /* Buttons */
        .btn {
            padding: 0.4rem 1rem;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:hover { background: #2563eb; }
        .btn-primary:disabled { background: #1e3a5f; color: #6b7280; cursor: wait; }
        .btn-success { background: #22c55e; color: #fff; }
        .btn-success:hover { background: #16a34a; }
        .btn-success:disabled { background: #14532d; color: #6b7280; cursor: wait; }
        .btn-danger { background: transparent; color: #ef4444; border: 1px solid #3a1a1a; font-size: 0.8rem; }
        .btn-danger:hover { background: #3a1a1a; }
        .btn-sm { padding: 0.25rem 0.6rem; font-size: 0.78rem; }
        .btn-ghost { background: transparent; color: #8b8fa3; border: 1px solid #2a2d3a; }
        .btn-ghost:hover { background: #1a1d27; color: #e1e4eb; }

        /* Cards */
        .card {
            background: #1a1d27;
            border: 1px solid #2a2d3a;
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin-bottom: 1rem;
        }

        /* Stats row */
        .stats-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #1a1d27;
            border: 1px solid #2a2d3a;
            border-radius: 8px;
            padding: 1rem 1.25rem;
            flex: 1;
            min-width: 120px;
        }
        .stat-val { font-size: 1.8rem; font-weight: 700; color: #3b82f6; }
        .stat-label { font-size: 0.75rem; color: #8b8fa3; text-transform: uppercase; letter-spacing: 0.05em; }

        /* Form */
        .add-form {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        input[type="text"] {
            background: #0f1117;
            border: 1px solid #2a2d3a;
            color: #e1e4eb;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            font-size: 0.9rem;
            flex: 1;
            max-width: 350px;
        }
        input[type="text"]:focus { outline: none; border-color: #3b82f6; }
        input[type="text"]::placeholder { color: #4a4d5a; }

        /* User list */
        .user-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid #1f2230;
        }
        .user-row:last-child { border-bottom: none; }
        .user-name {
            font-weight: 600;
            color: #3b82f6;
            cursor: pointer;
            font-size: 0.95rem;
        }
        .user-name:hover { text-decoration: underline; }
        .user-meta { font-size: 0.78rem; color: #8b8fa3; }
        .user-stats { display: flex; gap: 1rem; font-size: 0.8rem; color: #8b8fa3; }
        .user-stats strong { color: #e1e4eb; }

        /* Photo grid */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }
        .photo-card {
            background: #1a1d27;
            border: 1px solid #2a2d3a;
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.15s;
            cursor: pointer;
        }
        .photo-card:hover { border-color: #3b82f6; }
        .photo-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #0f1117;
            display: block;
        }
        .photo-card .info { padding: 0.75rem 1rem; }
        .photo-card .filename {
            font-weight: 600;
            font-size: 0.82rem;
            word-break: break-all;
            margin-bottom: 0.3rem;
            color: #e1e4eb;
        }
        .photo-card .desc {
            font-size: 0.78rem;
            color: #8b8fa3;
            max-height: 2.4em;
            overflow: hidden;
            margin-bottom: 0.4rem;
        }
        .usage-badge {
            display: inline-block;
            background: #1e3a5f;
            color: #60a5fa;
            padding: 0.15rem 0.5rem;
            border-radius: 3px;
            font-size: 0.72rem;
            font-weight: 600;
        }
        .usage-badge.zero { background: #3a2a1a; color: #f59e0b; }

        /* Tags */
        .tag {
            display: inline-block;
            background: #1e293b;
            color: #60a5fa;
            padding: 0.12rem 0.45rem;
            border-radius: 3px;
            font-size: 0.7rem;
            margin: 0.1rem;
        }

        /* Events feed */
        .event-item {
            display: flex;
            gap: 0.75rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid #1f2230;
            font-size: 0.85rem;
            align-items: flex-start;
        }
        .event-item:last-child { border-bottom: none; }
        .event-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 6px;
            flex-shrink: 0;
        }
        .event-dot.added { background: #22c55e; }
        .event-dot.removed { background: #ef4444; }
        .event-time { color: #6b7280; font-size: 0.75rem; white-space: nowrap; }
        .event-photo { color: #60a5fa; }
        .event-article { color: #e1e4eb; }
        .event-wiki { color: #6b7280; font-size: 0.72rem; }

        /* Article list */
        .usage-list { list-style: none; }
        .usage-list li {
            padding: 0.35rem 0;
            border-bottom: 1px solid #1f2230;
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .usage-list li:last-child { border-bottom: none; }
        .usage-list a { color: #60a5fa; text-decoration: none; }
        .usage-list a:hover { text-decoration: underline; }
        .wiki-badge {
            font-size: 0.7rem;
            background: #1e293b;
            color: #8b8fa3;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
        }

        /* Photo detail */
        .photo-header {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .photo-header img {
            width: 300px;
            height: 220px;
            object-fit: cover;
            border-radius: 8px;
            background: #0f1117;
            flex-shrink: 0;
        }
        .photo-meta { flex: 1; }
        .photo-meta h2 { font-size: 1rem; word-break: break-all; margin-bottom: 0.5rem; }
        .photo-meta .desc { color: #8b8fa3; font-size: 0.85rem; margin-bottom: 0.5rem; }

        .section-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: #8b8fa3;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 1rem 0 0.5rem;
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #2a2d3a;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty { text-align: center; padding: 3rem; color: #6b7280; }
        .polling-banner {
            background: #1e3a5f;
            color: #60a5fa;
            padding: 0.6rem 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
        }
        .polling-banner .progress-top {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.4rem;
        }
        .progress-bar-bg {
            height: 6px;
            background: #0f1117;
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: #3b82f6;
            border-radius: 3px;
            transition: width 0.3s ease;
        }
        .progress-detail {
            font-size: 0.78rem;
            color: #93c5fd;
            margin-top: 0.3rem;
        }
        .poll-result {
            background: #14532d;
            color: #86efac;
            padding: 0.6rem 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
        }
        .poll-result.error { background: #3a1a1a; color: #fca5a5; }

        /* Two-column layout for detail views */
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        @media (max-width: 700px) {
            .two-col { grid-template-columns: 1fr; }
            .photo-header { flex-direction: column; }
            .photo-header img { width: 100%; }
        }

        .suggest-area { margin-top: 0.5rem; }
        .suggestion-item { font-size: 0.82rem; padding: 0.2rem 0; }
        .suggestion-item a { color: #22c55e; text-decoration: none; }
        .suggestion-item a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<header>
    <h1>Photo<span>Post</span></h1>
    <div id="breadcrumb" class="breadcrumb"></div>
    <div class="spacer"></div>
</header>

<main id="app"></main>

<script>
// ─── State ───
let currentView = 'users';  // users | user-detail | photo-detail
let currentUserId = null;
let currentPhotoId = null;
let pollTimers = {};

const $ = id => document.getElementById(id);
const app = $('app');
const bc = $('breadcrumb');

function esc(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
}
function truncate(s, n) { return s && s.length > n ? s.slice(0, n) + '...' : (s || ''); }
function relTime(iso) {
    if (!iso) return 'Never';
    const d = new Date(iso);
    const diff = Date.now() - d.getTime();
    if (diff < 60000) return 'Just now';
    if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
    if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
    return d.toLocaleDateString();
}
function fmtDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleString();
}

async function api(path, opts = {}) {
    const resp = await fetch(path, {
        headers: { 'Content-Type': 'application/json' },
        ...opts,
        body: opts.body ? JSON.stringify(opts.body) : undefined,
    });
    return resp.json();
}

// ─── Router ───
function navigate(view, id, id2) {
    currentView = view;
    currentUserId = id || null;
    currentPhotoId = id2 || null;
    render();
}

// ─── Views ───
async function render() {
    if (currentView === 'users') await renderUsers();
    else if (currentView === 'user-detail') await renderUserDetail();
    else if (currentView === 'photo-detail') await renderPhotoDetail();
}

// ── Users list ──
async function renderUsers() {
    bc.innerHTML = '';
    const users = await api('api/users');

    app.innerHTML = `
        <div class="add-form">
            <input type="text" id="new-username" placeholder="Wikimedia Commons username">
            <button class="btn btn-primary" onclick="addUser()">Track User</button>
        </div>
        ${users.length === 0 ? '<div class="empty">No users tracked yet. Add a Commons username above.</div>' : ''}
        <div class="card" ${users.length === 0 ? 'style="display:none"' : ''}>
            ${users.map(u => `
                <div class="user-row">
                    <div style="flex:1">
                        <div class="user-name" onclick="navigate('user-detail', ${u.id})">${esc(u.username)}</div>
                        <div class="user-meta">Added ${relTime(u.added_at)} · Polled ${relTime(u.last_polled)}</div>
                    </div>
                    <div class="user-stats">
                        <span><strong>${u.photo_count}</strong> photos</span>
                        <span><strong>${u.active_usages}</strong> usages</span>
                    </div>
                    <button class="btn btn-success btn-sm" onclick="pollUser(${u.id}, '${esc(u.username)}')" ${u.is_polling ? 'disabled' : ''}>
                        ${u.is_polling ? '<span class="spinner"></span> Polling' : 'Poll Now'}
                    </button>
                    <button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id}, '${esc(u.username)}')">Remove</button>
                </div>
            `).join('')}
        </div>
    `;

    $('new-username')?.addEventListener('keydown', e => { if (e.key === 'Enter') addUser(); });
}

async function addUser() {
    const input = $('new-username');
    const username = input.value.trim();
    if (!username) return;
    const result = await api('api/users', { method: 'POST', body: { username } });
    if (result.error && !result.id) { alert(result.error); return; }
    render();
}

async function deleteUser(id, name) {
    if (!confirm('Remove ' + name + ' and all their data?')) return;
    await api('api/users/' + id, { method: 'DELETE' });
    render();
}

async function pollUser(id, name) {
    await api('api/users/' + id + '/poll', { method: 'POST' });
    render();
    // Start polling for status
    if (pollTimers[id]) clearInterval(pollTimers[id]);
    pollTimers[id] = setInterval(async () => {
        const status = await api('api/users/' + id + '/poll-status');
        if (!status.is_polling) {
            clearInterval(pollTimers[id]);
            delete pollTimers[id];
            render();
        }
    }, 3000);
}

// ── User detail ──
async function renderUserDetail() {
    const id = currentUserId;
    bc.innerHTML = `<a onclick="navigate('users')">Users</a> / Loading...`;

    const [photosData, stats, eventsData, statusData] = await Promise.all([
        api('api/users/' + id + '/photos'),
        api('api/users/' + id + '/stats'),
        api('api/users/' + id + '/events?limit=30'),
        api('api/users/' + id + '/poll-status'),
    ]);

    if (photosData.error) { app.innerHTML = '<div class="empty">' + esc(photosData.error) + '</div>'; return; }

    bc.innerHTML = `<a onclick="navigate('users')">Users</a> / ${esc(photosData.username)}`;

    const isPolling = statusData.is_polling;
    const pollResult = statusData.result;

    app.innerHTML = `
        ${isPolling ? `<div class="polling-banner" id="poll-banner">
            <div class="progress-top">
                <span class="spinner"></span>
                <span>Polling Commons API for ${esc(photosData.username)}...</span>
                <span id="poll-pct" style="margin-left:auto;font-weight:600">${statusData.progress?.pct || 0}%</span>
            </div>
            <div class="progress-bar-bg"><div class="progress-bar-fill" id="poll-bar" style="width:${statusData.progress?.pct || 0}%"></div></div>
            <div class="progress-detail" id="poll-detail">${esc(statusData.progress?.detail || 'Starting...')}</div>
        </div>` : ''}
        ${pollResult && !pollResult.error ? `
            <div class="poll-result">
                Poll complete: ${pollResult.total_photos} photos scanned,
                ${pollResult.new_photos} new photos,
                ${pollResult.new_usages} new usages,
                ${pollResult.removed_usages} removed
            </div>
        ` : ''}
        ${pollResult && pollResult.error ? '<div class="poll-result error">Poll error: ' + esc(pollResult.error) + '</div>' : ''}

        <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem">
            <h2 style="font-size:1.1rem">${esc(photosData.username)}</h2>
            <button class="btn btn-success btn-sm" onclick="pollUserDetail(${id}, '${esc(photosData.username)}')" ${isPolling ? 'disabled' : ''}>
                ${isPolling ? '<span class="spinner"></span> Polling...' : 'Poll Now'}
            </button>
        </div>

        <div class="stats-row">
            <div class="stat-card"><div class="stat-val">${stats.total_photos}</div><div class="stat-label">Photos</div></div>
            <div class="stat-card"><div class="stat-val">${stats.active_usages}</div><div class="stat-label">Active Usages</div></div>
            <div class="stat-card"><div class="stat-val">${stats.unused_photos}</div><div class="stat-label">Unused</div></div>
            <div class="stat-card"><div class="stat-val">${stats.unique_wikis}</div><div class="stat-label">Wikis</div></div>
            <div class="stat-card"><div class="stat-val">${stats.avg_usages}</div><div class="stat-label">Avg Uses</div></div>
        </div>

        <div class="two-col">
            <div>
                <div class="section-title">Photos (${photosData.total})</div>
                <div class="photo-grid" style="grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));">
                    ${photosData.photos.map(p => `
                        <div class="photo-card" onclick="navigate('photo-detail', ${id}, ${p.id})">
                            <img src="${esc(p.thumb_url)}" alt="${esc(p.filename)}" loading="lazy"
                                 onerror="this.style.display='none'">
                            <div class="info">
                                <div class="filename">${esc(truncate(p.filename, 45))}</div>
                                ${p.description ? '<div class="desc">' + esc(truncate(p.description, 80)) + '</div>' : ''}
                                <span class="usage-badge ${p.usage_count === 0 ? 'zero' : ''}">${p.usage_count} usage${p.usage_count !== 1 ? 's' : ''}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
                ${photosData.total === 0 ? '<div class="empty">No photos yet. Hit "Poll Now" to fetch from Commons.</div>' : ''}
            </div>
            <div>
                <div class="section-title">Recent Events</div>
                <div class="card">
                    ${eventsData.events.length === 0 ? '<div class="empty" style="padding:1rem">No events yet. Poll to start tracking.</div>' : ''}
                    ${eventsData.events.map(e => `
                        <div class="event-item">
                            <div class="event-dot ${e.event_type}"></div>
                            <div style="flex:1">
                                <span class="event-photo" style="cursor:pointer"
                                      onclick="navigate('photo-detail', ${id}, ${e.photo_id})">${esc(truncate(e.photo_filename, 35))}</span>
                                <span style="color:#6b7280">${e.event_type === 'added' ? 'added to' : 'removed from'}</span>
                                <span class="event-article">${esc(e.article_title)}</span>
                                <span class="event-wiki">${esc(e.wiki)}</span>
                            </div>
                            <div class="event-time">${relTime(e.timestamp)}</div>
                        </div>
                    `).join('')}
                </div>
            </div>
        </div>
    `;

    if (isPolling) {
        if (pollTimers['detail_' + id]) clearInterval(pollTimers['detail_' + id]);
        pollTimers['detail_' + id] = setInterval(async () => {
            const s = await api('api/users/' + id + '/poll-status');
            if (!s.is_polling) {
                clearInterval(pollTimers['detail_' + id]);
                delete pollTimers['detail_' + id];
                render();
            } else if (s.progress) {
                // Update progress bar in-place
                const bar = $('poll-bar');
                const pct = $('poll-pct');
                const detail = $('poll-detail');
                if (bar) bar.style.width = (s.progress.pct || 0) + '%';
                if (pct) pct.textContent = (s.progress.pct || 0) + '%';
                if (detail) detail.textContent = s.progress.detail || '';
            }
        }, 2000);
    }
}

async function pollUserDetail(id, name) {
    await api('api/users/' + id + '/poll', { method: 'POST' });
    render();
}

// ── Photo detail ──
async function renderPhotoDetail() {
    const uid = currentUserId;
    const pid = currentPhotoId;
    bc.innerHTML = `<a onclick="navigate('users')">Users</a> / <a onclick="navigate('user-detail', ${uid})">Loading...</a> / Photo`;

    const photo = await api('api/photos/' + pid);
    if (photo.error) { app.innerHTML = '<div class="empty">' + esc(photo.error) + '</div>'; return; }

    // Get parent user name from the user-detail breadcrumb context
    const userPhotos = await api('api/users/' + uid + '/photos');
    const userName = userPhotos.username || 'User';

    bc.innerHTML = `<a onclick="navigate('users')">Users</a> / <a onclick="navigate('user-detail', ${uid})">${esc(userName)}</a> / ${esc(truncate(photo.filename, 30))}`;

    app.innerHTML = `
        <div class="photo-header">
            <img src="${esc(photo.thumb_url)}" alt="${esc(photo.filename)}"
                 onerror="this.src=''; this.alt='Image unavailable'">
            <div class="photo-meta">
                <h2>${esc(photo.filename)}</h2>
                ${photo.description ? '<div class="desc">' + esc(photo.description) + '</div>' : ''}
                <div style="font-size:0.8rem;color:#8b8fa3;margin-bottom:0.5rem">
                    Uploaded ${fmtDate(photo.upload_date)}
                </div>
                <div style="margin-bottom:0.5rem">
                    ${(photo.categories || []).slice(0, 10).map(c => '<span class="tag">' + esc(c) + '</span>').join(' ')}
                </div>
                <a href="https://commons.wikimedia.org/wiki/File:${encodeURIComponent(photo.filename)}"
                   target="_blank" class="btn btn-ghost btn-sm" style="margin-right:0.5rem">View on Commons</a>
                <button class="btn btn-success btn-sm" id="suggest-btn" onclick="getSuggestions()">Suggest Articles</button>
                <div id="suggestions" class="suggest-area"></div>
            </div>
        </div>

        <div class="two-col">
            <div>
                <div class="section-title">Active Usages (${photo.active_usages.length})</div>
                <div class="card">
                    ${photo.active_usages.length === 0 ? '<div style="color:#6b7280;font-size:0.85rem">Not used in any articles</div>' : ''}
                    <ul class="usage-list">
                        ${photo.active_usages.map(u => `
                            <li>
                                <a href="${esc(u.article_url)}" target="_blank">${esc(u.article_title)}</a>
                                <span>
                                    <span class="wiki-badge">${esc(u.wiki)}</span>
                                    <span style="font-size:0.72rem;color:#6b7280;margin-left:0.3rem">since ${relTime(u.first_seen)}</span>
                                </span>
                            </li>
                        `).join('')}
                    </ul>
                </div>

                ${photo.removed_usages.length > 0 ? `
                    <div class="section-title">Removed Usages (${photo.removed_usages.length})</div>
                    <div class="card">
                        <ul class="usage-list">
                            ${photo.removed_usages.map(u => `
                                <li style="opacity:0.6">
                                    <span>${esc(u.article_title)}</span>
                                    <span class="wiki-badge">${esc(u.wiki)}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                ` : ''}
            </div>
            <div>
                <div class="section-title">History</div>
                <div class="card">
                    ${photo.events.length === 0 ? '<div style="color:#6b7280;font-size:0.85rem">No events recorded yet</div>' : ''}
                    ${photo.events.map(e => `
                        <div class="event-item">
                            <div class="event-dot ${e.event_type}"></div>
                            <div style="flex:1">
                                <span style="color:#e1e4eb">${e.event_type === 'added' ? 'Added to' : 'Removed from'}</span>
                                <span class="event-article">${esc(e.article_title)}</span>
                                <span class="event-wiki">${esc(e.wiki)}</span>
                            </div>
                            <div class="event-time">${fmtDate(e.timestamp)}</div>
                        </div>
                    `).join('')}
                </div>
            </div>
        </div>
    `;

    // Store photo data for suggestions
    window._currentPhoto = photo;
}

async function getSuggestions() {
    const btn = $('suggest-btn');
    const container = $('suggestions');
    const photo = window._currentPhoto;
    if (!photo) return;

    btn.disabled = true;
    btn.textContent = 'Finding...';

    try {
        const data = await api('api/suggest', {
            method: 'POST',
            body: {
                categories: photo.categories || [],
                description: photo.description || '',
                current_articles: photo.active_usages.map(u => u.article_title),
            },
        });

        if (data.suggestions && data.suggestions.length) {
            container.innerHTML = `
                <div class="section-title" style="margin-top:0.5rem">Suggested Articles</div>
                ${data.suggestions.map(s => `
                    <div class="suggestion-item">
                        <a href="https://en.wikipedia.org/wiki/${encodeURIComponent(s.title)}"
                           target="_blank">${esc(s.title)}</a>
                    </div>
                `).join('')}
            `;
        } else {
            container.innerHTML = '<div style="font-size:0.8rem;color:#6b7280;margin-top:0.3rem">No suggestions found</div>';
        }
    } catch (err) {
        container.innerHTML = '<div style="font-size:0.8rem;color:#ef4444;margin-top:0.3rem">Error: ' + esc(err.message) + '</div>';
    } finally {
        btn.style.display = 'none';
    }
}

// ─── Init ───
render();
</script>
</body>
</html>
